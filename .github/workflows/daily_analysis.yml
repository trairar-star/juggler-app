name: Daily AI Analysis

on:
  schedule:
    # 毎日 日本時間の朝6:00 に実行（UTCでは前日の21:00になります）
    - cron: '0 21 * * *'
  # GitHubの画面から手動で実行できるボタンも有効化
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
    # 1. リポジトリのコードを取得
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Pythonの環境を準備
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. 必要なライブラリをインストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Google認証情報(JSON)を作成
    - name: Create service_account.json
      env:
        GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
      run: |
        echo "$GCP_SERVICE_ACCOUNT_JSON" > service_account.json

    # 5. バッチ実行スクリプトを起動 (StreamlitサーバーではなくPythonコマンドとして純粋に計算のみを実行)
    - name: Run Batch Analysis
      run: |
        python batch_run.py